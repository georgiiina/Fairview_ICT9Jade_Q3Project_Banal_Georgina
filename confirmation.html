<!DOCTYPE html>
<html>
<head>
    <title>BiyaHero - Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
       
        :root {
            --primary-orange: #FF7F50; 
            --primary-pink: #FF69B4;  
            --accent-yellow: #FFD700;  
        }

        body {
            background: linear-gradient(rgba(255, 105, 180, 0.5), rgba(255, 127, 80, 0.5)), 
                        url(https://awesomewave.net/wp-content/uploads/Singapore-MRT.png);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            flex-direction: column; 
        }
         
        .footer { 
            background: #111; 
            color: white; 
            padding: 40px 0; 
            border-top: 5px solid var(--accent-yellow);
            width: 100%;
        }

        .navbar { 
            background-color: white !important; 
            border-bottom: 3px solid var(--primary-orange);
        }

        .success-card {
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 4px solid var(--primary-pink) !important;
            border-radius: 30px !important;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.4);
        }
        
        .brand-logo {
            height: 35px;
            width: auto;
            margin-right: 10px; 
            vertical-align: middle;
        }

        .mascot-success {
            max-width: 150px;
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.7));
            margin-bottom: -10px;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 40px 0;
        }

        .btn-hero {
            background-color: var(--primary-orange);
            color: white;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }

        .btn-hero:hover {
            background-color: var(--primary-pink);
            transform: scale(1.05);
            color: white;
        }
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm w-100">
        <div class="container">
            <a class="navbar-brand fw-bold" href="3Qhome.html" style="color: var(--primary-orange);">
                BIYAHERO
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="3Qhome.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link" href="3QPage1.html">CALCULATOR</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-dark text-white ms-lg-3 px-3" href="3QPage2.html">SIGN UP</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="container text-center">
            <div class="card p-5 success-card mx-auto" style="max-width: 500px;">
                
                <div class="mb-2">
                    <img src="Hero_Image.png" alt="Happy Mascot" class="mascot-success">
                </div>

                <h1 class="fw-bold" style="color: var(--primary-pink);">Hero Registered!</h1>
                <p class="lead text-muted">You're ready to conquer the commute.</p>
                
                <hr style="border-top: 2px solid var(--accent-yellow);">
                
                <div class="alert text-start" style="background-color: #fffaf0; border-left: 5px solid var(--primary-orange);" role="alert">
                    <strong style="color: var(--primary-orange);">Account Details:</strong><br>
                    <span class="small">Name: Verified BiyaHero</span><br>
                    <span class="small">Status: <span class="text-success fw-bold">Active & Ready</span></span>
                </div>

                <a href="3QPage1.html" class="btn btn-hero btn-lg w-100 mt-3 shadow-sm">GO TO CALCULATOR</a>
                <a href="3Qhome.html" class="btn btn-link mt-2 text-decoration-none" style="color: var(--primary-pink);">Back to Home</a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <footer class="footer text-center">
        <div class="container">
            <p class="mb-1 fw-bold">BiyaHero | Grade 9 - Jade</p>
            <p class="small text-muted">
               <a href="https://www.metrolinemap.com/metro/manila/" class="text-info text-decoration-none">Metro Map</a> | 
               <a href="https://www.w3schools.com/" class="text-info text-decoration-none">Code Sources</a>
            </p>
        </div>
    </footer>
    
</body>
</html>
