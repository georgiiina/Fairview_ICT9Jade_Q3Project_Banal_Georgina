<!DOCTYPE html>
<html>
<head>
    <title>BiyaHero - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-image: url(https://www.trainairtram.com/uploads/1/3/1/9/13192605/gif-2_orig.gif);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .footer { background: #000000; color: white; padding: 30px 0; margin-top: 50px; }

        #pfp {
            border-radius: 50%;
            border: 3px solid #f8f9fa;
            object-fit: cover;
            margin-bottom: 15px;
        }

        #home-link, #reg {
            color: #000000;
        }
        
    
        .brand-logo {
            height: 35px;
            width: auto;
            margin-right: 10px; 
            vertical-align: middle;
        }
        
        .card {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="Q3Project.html">
                <img src="Biyahero.png" alt="Logo" class="brand-logo">
                BIYAHERO
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="3Qhome.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link" href="3QPage1.html">CALCULATOR</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-dark text-white ms-lg-3" href="3QPage2.html">SIGN UP</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5" style="min-height: 80vh;">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-lg border-0">
                    <h2 class="text-center fw-bold mb-4" id="reg">Create Your Account</h2>
                    
                    <center>
                        <img src="https://braverplayers.org/wp-content/uploads/2022/09/blank-pfp.png" width="120px" height="120px" id="pfp">
                        <div class="mb-3">
                            <input type="file" class="form-control d-none" id="fileupload">
                            <button class="btn btn-outline-primary btn-sm" onclick="document.getElementById('fileupload').click();">Upload Photo</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="pfpfinish()">Remove</button>
                        </div>
                        
                        <details class="mb-4">
                            <summary class="text-muted small">Need help? Click here.</summary>
                            <p id="instructions" class="small p-2 bg-light rounded mt-2"></p>
                        </details>
                    </center>

                    <form>
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label fw-bold">Full Name</label>
                                <input type="text" class="form-control" placeholder="Enter your full name" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Birth Date</label>
                                <input type="date" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Contact Number</label>
                                <input type="tel" class="form-control" placeholder="+63..." required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email Address</label>
                            <input type="email" class="form-control" placeholder="Enter your Email" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control" placeholder="....." required>
                        </div>

                        <button type="submit" onclick="window.location.href='3Qpage3.html'; return false;" class="btn btn-dark w-100 py-2 shadow-sm">Register Now</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('instructions').innerHTML = 'Please fill out all fields correctly. Ensure your email is active for verification.';

        function pfpfinish() {
            document.getElementById('pfp').src = 'https://braverplayers.org/wp-content/uploads/2022/09/blank-pfp.png';
        }
    </script>

      <footer class="footer text-center">
        <div class="container">
            <p class="mb-1">BiyaHero | Grade 9 - Jade</p>
            <p class="small text-muted">
               <a href="https://www.metrolinemap.com/metro/manila/" class="text-info text-decoration-none">Metro Map</a> | 
               <a href="https://www.w3schools.com/" class="text-info text-decoration-none">Code Sources</a>
            </p>
        </div>
    </footer>
    
</body>
</html>
