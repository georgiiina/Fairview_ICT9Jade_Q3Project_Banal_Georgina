<!DOCTYPE html>
<html>
<head>
    <title>BiyaHero - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* CONSISTENT COLOR THEME */
        :root {
            --primary-orange: #FF7F50; 
            --primary-pink: #FF69B4;  
            --accent-yellow: #FFD700;  
        }

        body {
            /* Kept your GIF but added a slight pink overlay to match the theme */
            background: linear-gradient(rgba(255, 105, 180, 0.3), rgba(255, 127, 80, 0.3)), 
                        url(https://www.trainairtram.com/uploads/1/3/1/9/13192605/gif-2_orig.gif);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Footer matching Home and Calculator */
        .footer { 
            background: #111; 
            color: white; 
            padding: 40px 0; 
            border-top: 4px solid var(--accent-yellow);
        }

        .navbar { 
            background-color: white !important; 
            border-bottom: 3px solid var(--primary-orange);
        }

        /* Profile Picture Styling */
        #pfp {
            border-radius: 50%;
            border: 4px solid var(--accent-yellow);
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .brand-logo {
            height: 35px;
            width: auto;
            margin-right: 10px; 
            vertical-align: middle;
        }
        
        /* Card with glowing pink border */
        .card {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            border: 3px solid var(--primary-pink) !important;
            border-radius: 20px !important;
        }

        #reg {
            color: var(--primary-orange);
        }

        .btn-register {
            background-color: var(--primary-pink);
            border: none;
            color: white;
            font-weight: bold;
        }

        .btn-register:hover {
            background-color: #ff4da6;
            color: white;
        }

        .mascot-signup {
            max-width: 100px;
            margin-bottom: -10px;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5));
        }
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="3Qhome.html" style="color: var(--primary-orange);">
                BIYAHERO
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="3Qhome.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link" href="3QPage1.html">CALCULATOR</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-dark text-white ms-lg-3" href="3QPage2.html">SIGN UP</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5" style="min-height: 80vh;">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-lg">
                    <div class="text-center">
                        <h2 class="fw-bold mb-4" id="reg">Join the Heroes</h2>
                    </div>
                    
                    <center>
                        <img src="Zoomed_Hero_Image.png" width="150px" height="150px" id="pfp">
                        <div class="mb-3">
                            <input type="file" class="form-control d-none" id="fileupload">
                            <button class="btn btn-sm text-white" style="background-color: var(--primary-orange);" onclick="document.getElementById('fileupload').click();">Upload Photo</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="pfpfinish()">Remove</button>
                        </div>
                        
                        <details class="mb-4">
                            <summary class="text-muted small">Need help? Click here.</summary>
                            <p id="instructions" class="small p-2 bg-light rounded mt-2"></p>
                        </details>
                    </center>

                    <form>
                        <div class="mb-3">
                            <label class="form-label fw-bold" style="color: var(--primary-orange);">Full Name</label>
                            <input type="text" class="form-control" placeholder="Enter your full name" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold" style="color: var(--primary-orange);">Birth Date</label>
                                <input type="date" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold" style="color: var(--primary-orange);">Contact Number</label>
                                <input type="tel" class="form-control" placeholder="+63..." required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold" style="color: var(--primary-orange);">Email Address</label>
                            <input type="email" class="form-control" placeholder="Enter your Email" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold" style="color: var(--primary-orange);">Password</label>
                            <input type="password" class="form-control" placeholder="....." required>
                        </div>

                        <button type="submit" onclick="window.location.href='3Qpage3.html'; return false;" class="btn btn-register w-100 py-2 shadow-sm">BE A HERO NOW</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('instructions').innerHTML = 'Please fill out all fields correctly. Ensure your email is active for verification.';

        function pfpfinish() {
            document.getElementById('pfp').src = 'https://braverplayers.org/wp-content/uploads/2022/09/blank-pfp.png';
        }
    </script>

    <footer class="footer text-center">
        <div class="container">
            <p class="mb-1">BiyaHero | Grade 9 - Jade</p>
            <p class="small text-muted">
               <a href="https://www.metrolinemap.com/metro/manila/" class="text-info text-decoration-none">Metro Map</a> | 
               <a href="https://www.w3schools.com/" class="text-info text-decoration-none">Code Sources</a>
            </p>
        </div>
    </footer>
    
</body>
</html>
